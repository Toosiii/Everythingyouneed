    - title: 💻 Informatik
      description: Algorithmen, Sortierverfahren, Datenstrukturen und mehr für das Abitur.
      tags:
      - Informatik
      - Algorithmen
      - Abitur
      image: https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800&q=80
      steps:
      - Bubble Sort — benachbarte Elemente werden vertauscht, wenn sie in der falschen Reihenfolge sind. O(n²) im schlechtesten
        Fall.
      - Selection Sort — das kleinste Element wird gesucht und an den Anfang gesetzt. O(n²). Einfach zu verstehen.
      - Insertion Sort — das Array wird schrittweise aufgebaut, jedes Element an die richtige Stelle eingefügt. O(n²) worst,
        O(n) best.
      - Merge Sort — Array wird rekursiv halbiert, dann werden sortierte Hälften zusammengeführt. O(n log n) immer.
      - Quick Sort — Pivot-Element auswählen, Array aufteilen, rekursiv sortieren. O(n log n) im Durchschnitt.
      - Binäre Suche — funktioniert nur auf sortierten Arrays. Suchraum wird bei jedem Schritt halbiert. O(log n).
      - O-Notation — O(1) = konstant, O(n) = linear, O(n²) = quadratisch, O(log n) = logarithmisch.
