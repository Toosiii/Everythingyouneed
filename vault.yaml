- title: How to Use a Temp Mail
  description: Many sites require an email to sign up. Use a disposable temp email
    so your real inbox stays clean.
  tags:
  - Privacy
  - Tips
  steps:
  - Go to temp-mail.org or 10minutemail.com
  - Copy the auto-generated email address
  - Paste it into the site you want to register on
  - Go back to the temp mail tab to receive the confirmation email
  - Done — throw the address away when finished
  links:
  - title: Temp Mail
    url: https://temp-mail.org/
  - title: 10 Minute Mail
    url: https://10minutemail.com/
