entries:
- title: 🤖 Claude Stuff
  description: Useful prompts, tips and tricks to get the most out of Claude. Whether you want better answers, code help or
    creative writing — these will level you up.
  tags:
  - Claude
  - AI
  - Prompts
  - Tips
  image: https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=800&q=80
  steps:
  - Be specific — instead of 'explain X' try 'explain X like I'm 15 with no background in it'
  - Ask Claude to think step by step — add 'think step by step' to any complex question for better results
  - Use 'rewrite this but make it sound more casual / professional / shorter' to refine any text
  - Paste your code and say 'find the bug and explain why it happens' — works incredibly well
  - Say 'give me 10 ideas for...' to brainstorm fast, then ask Claude to expand on the best one
  - 'For essays or writing: ''write a rough draft, then list 3 ways to improve it'''
  - Use 'act as a [role] and help me with...' — e.g. 'act as a football coach and build me a training plan'
  - 'If an answer is too long: say ''give me the same answer but in 3 bullet points max'''
  - Chain prompts — after a good answer say 'now make it funnier / more detailed / in German'
  - Ask Claude to quiz you on something — great for studying any subject
  links:
  - title: Claude.ai
    url: https://claude.ai/
  - title: Claude API Docs
    url: https://docs.anthropic.com/
  - title: Prompt Engineering Guide
    url: https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview
