  type: category
  subjects:

    - title: "💻 IT / Computer Science"
      description: "Key topics in IT — algorithms, sorting, data structures and more."
      tags: [IT, Algorithms, Sorting]
      image: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800&q=80"
      steps:
        - "Bubble Sort — repeatedly swap adjacent elements if they are in the wrong order. O(n²) worst case. Simple but slow."
        - "Selection Sort — find the minimum element and place it at the beginning each pass. O(n²). Easy to understand."
        - "Insertion Sort — build sorted array one item at a time by inserting each into its correct position. O(n²) worst, O(n) best."
        - "Merge Sort — divide array in half recursively, then merge sorted halves. O(n log n) always. Stable and reliable."
        - "Quick Sort — pick a pivot, partition elements around it, recurse on both sides. O(n log n) avg, O(n²) worst."
        - "Binary Search — only works on sorted arrays. Cut search space in half each step. O(log n)."
        - "Big-O Notation — describes algorithm efficiency. O(1) = constant, O(n) = linear, O(n²) = quadratic."
      links:
        - title: "VisuAlgo — Visualise Sorting"
